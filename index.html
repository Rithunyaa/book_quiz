<!DOCTYPE html>
<html lang="en">

<head>
  <title>Rithunyaa's Personality Quiz</title>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="/style.css">

  <script src="/script.js" defer></script>
</head>

<body>

  <header>
    <h1>What book should you read next?</h1>
    <p>Click whichever choice feels the most like you!</p>
  </header>

  <main>

    <h2>What is your favorite genre?</h2>

    <div class="question">

      <div class="answer-choice">
        <button id="q1a1">Fantasy/Dystopian</button>
      </div>

      <div class="answer-choice">
        <button id="q1a2">Realistic Fiction</button>
      </div>

    </div>



    <h2>What sort of mood are you in?</h2>

    <div class="question">

      <div class="answer-choice">
        <button id="q2a1">I want to read something thought-provoking.</button>
      </div>

      <div class="answer-choice">
        <button id="q2a2">I want to read something light-hearted and cozy.</button>
      </div>

    </div>



    <h2>How many books do you want to read?</h2>

    <div class="question">

      <div class="answer-choice">
        <button id="q3a1">Just one standalone book!</button>
      </div>

      <div class="answer-choice">
        <button id="q3a2">Multiple / A series</button>
      </div>

    </div>



    <h2 id="result">Your result is...</h2>

  </main>

</body>

</html>
